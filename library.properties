sentence=High-performance embedded C++ libraries for ESP32, STM32 and other MCUs: system-state notification broker.
paragraph=Embedded C++17 non-blocking state-change broadcaster. Core interfaces (ISystemStateListener, SystemStateNotifier<N>) are pure C++17 and portable. Optional ESP32SystemStateListener<PollMs> provides a FreeRTOS task-notification backend. No queues, no heap in hot paths. Supported targets: ESP32 today with a FreeRTOS backend; STM32 and other MCUs via a host-supplied listener implementation.
